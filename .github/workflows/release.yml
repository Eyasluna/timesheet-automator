name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    # On PR events: only run if the PR was actually merged (not just closed).
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Determine bump type
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          DISPATCH_BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${DISPATCH_BUMP}" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch bump: ${DISPATCH_BUMP}"
            exit 0
          fi
          echo "PR labels: $LABELS"
          if echo "$LABELS" | grep -q '"release:skip"'; then
            echo "type=skip" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release
        if: steps.bump.outputs.type == 'skip'
        run: echo "PR labeled release:skip — exiting." && exit 0

      - name: Configure git author
        if: steps.bump.outputs.type != 'skip'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        if: steps.bump.outputs.type != 'skip'
        run: npm ci

      - name: Bump version
        if: steps.bump.outputs.type != 'skip'
        id: ver
        run: |
          set -euo pipefail
          # npm version creates a commit and tag; -m adds a clean message
          NEW=$(npm version ${{ steps.bump.outputs.type }} -m "chore(release): v%s")
          echo "version=${NEW#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW}"        >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW}"

      - name: Build
        if: steps.bump.outputs.type != 'skip'
        run: npm run build

      - name: Package release tarball
        if: steps.bump.outputs.type != 'skip'
        id: pkg
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          NAME="timesheet-automator-${VERSION}"
          mkdir -p "out/${NAME}"
          cp -R bin dist package.json README.md "out/${NAME}/"
          tar -czf "${NAME}.tar.gz" -C out "${NAME}"
          SHA=$(shasum -a 256 "${NAME}.tar.gz" | awk '{print $1}')
          echo "tarball=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}"          >> "$GITHUB_OUTPUT"
          {
            echo "## Homebrew formula values"
            echo '```'
            echo "url    https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.ver.outputs.tag }}/${NAME}.tar.gz"
            echo "sha256 ${SHA}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push commit and tag
        if: steps.bump.outputs.type != 'skip'
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'skip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: ${{ steps.pkg.outputs.tarball }}
          body: |
            ## Install

            ```
            brew update
            brew upgrade eyasluna/tap/timesheet-automator
            ```

            Or first-time install:

            ```
            brew install eyasluna/tap/timesheet-automator
            timesheet-automator
            ```

            **Tarball sha256:** `${{ steps.pkg.outputs.sha256 }}`

      - name: Bump Homebrew tap formula
        if: steps.bump.outputs.type != 'skip'
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.pkg.outputs.sha256 }}
          TARBALL: ${{ steps.pkg.outputs.tarball }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "TAP_TOKEN secret not set — skipping tap bump."
            exit 0
          fi

          TAP_DIR="$(mktemp -d)/homebrew-tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Eyasluna/homebrew-tap.git" "${TAP_DIR}"
          cd "${TAP_DIR}"

          FORMULA="Formula/timesheet-automator.rb"
          NEW_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${TARBALL}"

          # Replace url and sha256 lines. Pipe delimiter avoids escaping slashes in the URL.
          sed -i -E "s|^(  url )\".*\"|\\1\"${NEW_URL}\"|"   "${FORMULA}"
          sed -i -E "s|^(  sha256 )\".*\"|\\1\"${SHA256}\"|" "${FORMULA}"

          echo "--- Updated formula ---"
          grep -E "^  (url|sha256) " "${FORMULA}"

          if git diff --quiet "${FORMULA}"; then
            echo "Formula already up to date — nothing to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "timesheet-automator ${VERSION}"
          git push
